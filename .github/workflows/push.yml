name: build

on:
  pull_request:
  push:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: astral-sh/setup-uv@5a095e7a2014a4212f075830d4f7277575a9d098 # v7.3.1
        with:
          version: "0.11.2"
          checksum: "7ac2ca0449c8d68dae9b99e635cd3bc9b22a4cb1de64b7c43716398447d42981"
          python-version: "3.12"
      - name: Scrub internal proxy URLs from uv.lock
        run: sed -i 's|https://pypi-proxy\.dev\.databricks\.com/simple|https://pypi.org/simple|g' uv.lock
      - run: uv sync --frozen
      - run: make test
      - name: Verify requirements.txt is in sync with the lockfile
        run: |
          make requirements
          git diff --exit-code -- requirements.txt \
            || { echo "requirements.txt is stale. Run 'make requirements' (or 'make precommit') and commit it."; exit 1; }

  fmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: astral-sh/setup-uv@5a095e7a2014a4212f075830d4f7277575a9d098 # v7.3.1
        with:
          version: "0.11.2"
          checksum: "7ac2ca0449c8d68dae9b99e635cd3bc9b22a4cb1de64b7c43716398447d42981"
          python-version: "3.12"
      - name: Scrub internal proxy URLs from uv.lock
        run: sed -i 's|https://pypi-proxy\.dev\.databricks\.com/simple|https://pypi.org/simple|g' uv.lock
      - run: uv sync --frozen
      - run: make fmt
      - name: Check for formatting changes
        run: |
          if [ -n "$(git diff)" ]; then
            echo "Code formatting issues detected. Run 'make fmt' locally."
            git diff
            exit 1
          fi
